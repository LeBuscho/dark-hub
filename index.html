<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LeBuscho's Dark Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>

/* ================= RESET ================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Orbitron', sans-serif;
}

body{
    background:#05010a;
    overflow:hidden;
    color:white;
    position:relative;
}

/* ================= LOADING ================= */
#loading{
    position:fixed;
    inset:0;
    background:#05010a;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.loader{
    width:80px;
    height:80px;
    border-radius:50%;
    border:3px solid #2a0033;
    border-top:3px solid #b300ff;
    animation:spin 1s linear infinite;
    box-shadow:0 0 30px #b300ff;
}

@keyframes spin{
    100%{transform:rotate(360deg);}
}

.loading-text{
    margin-top:20px;
    color:#b300ff;
    text-shadow:0 0 20px #b300ff;
}

/* ================= BACKGROUND GRADIENT ================= */
body::before{
    content:"";
    position:fixed;
    inset:0;
    z-index:-2;

    background: linear-gradient(-45deg,
        #12001f,
        #2a0055,
        #3b0077,
        #1a0033,
        #4a00ff,
        #ff00ff
    );

    background-size:400% 400%;
    animation: gradientMove 12s ease infinite;

    filter: blur(40px);
    opacity:0.9;
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* ================= GLOW LAYER ================= */
body::after{
    content:"";
    position:fixed;
    inset:0;
    z-index:-1;

    background:
        radial-gradient(circle at 20% 30%, rgba(180,0,255,0.35), transparent 40%),
        radial-gradient(circle at 80% 60%, rgba(255,0,255,0.25), transparent 45%),
        radial-gradient(circle at 50% 90%, rgba(120,0,255,0.2), transparent 50%);

    animation: glowMove 10s ease-in-out infinite alternate;
}

@keyframes glowMove{
    0%{transform:scale(1);}
    100%{transform:scale(1.2) translate(20px,-10px);}
}

/* ================= MATRIX ================= */
#matrix{
    position:fixed;
    inset:0;
    z-index:0;
    opacity:0.12;
}

/* ================= PARTICLES ================= */
.particles{
    position:fixed;
    inset:0;
    background-image:radial-gradient(#d000ff 1px, transparent 1px);
    background-size:35px 35px;
    opacity:0.05;
}

/* ================= CURSOR ================= */
.cursor-glow{
    position:fixed;
    width:280px;
    height:280px;
    background:radial-gradient(circle, rgba(200,0,255,0.35), transparent 60%);
    pointer-events:none;
    transform:translate(-50%, -50%);
    filter:blur(25px);
    z-index:2;
}

/* ================= LAYOUT ================= */
.container{
    position:relative;
    z-index:3;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    perspective:1200px;
}

/* ================= TITLE ================= */
h1{
    font-size:72px;
    color:#d06bff;
    text-shadow:0 0 40px #b300ff, 0 0 80px #7a00ff;
    margin-bottom:10px;
    animation:pulse 2s infinite;
}

@keyframes pulse{
    50%{
        text-shadow:0 0 60px #ff00ff, 0 0 120px #7a00ff;
    }
}

.subtitle{
    color:#aaa;
    margin-bottom:30px;
}

/* ================= BUTTONS 3D ================= */
.btn{
    width:340px;
    padding:18px;
    margin:15px;
    border-radius:16px;
    text-decoration:none;
    color:white;
    font-size:20px;
    font-weight:bold;
    background:rgba(255,255,255,0.05);
    border:1px solid #b300ff;
    backdrop-filter:blur(12px);
    box-shadow:0 0 20px #7a00ff55;
    transition:0.25s;
    animation:float3d 6s ease-in-out infinite;
    transform-style:preserve-3d;
}

.btn:hover{
    transform:rotateX(10deg) rotateY(-10deg) scale(1.08);
    box-shadow:0 0 40px #ff00ff;
}

@keyframes float3d{
    0%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0);}
}

/* ================= SETTINGS ================= */
.settings{
    position:fixed;
    top:20px;
    right:20px;
    z-index:10;
    display:flex;
    gap:10px;
}

.settings button{
    background:rgba(0,0,0,0.4);
    border:1px solid #b300ff;
    color:white;
    padding:10px;
    border-radius:10px;
    cursor:pointer;
    box-shadow:0 0 15px #7a00ff55;
}

.settings button:hover{
    transform:scale(1.1);
    box-shadow:0 0 30px #ff00ff;
}

</style>
</head>

<body>

<!-- LOADING -->
<div id="loading">
    <div class="loader"></div>
    <div class="loading-text">Booting Dark Hub...</div>
</div>

<!-- MATRIX -->
<canvas id="matrix"></canvas>

<div class="particles"></div>
<div class="cursor-glow" id="glow"></div>

<!-- SETTINGS -->
<div class="settings">
    <button onclick="toggleSound()">🔊 Sound</button>
    <button onclick="toggleMatrix()">🌌 Matrix</button>
</div>

<!-- CONTENT -->
<div class="container">

<h1>LeBuscho's Dark Hub</h1>
<div class="subtitle">Cyber Neon Control System</div>

<a class="btn hover-sound" href="https://bigtimefm.de/wunschbox" target="_blank">🎵 BigTimeFM</a>
<a class="btn hover-sound" href="https://scnx.app/de/guild/1469647834675413079/bot/manage" target="_blank">🤖 SCNX</a>
<a class="btn hover-sound" href="https://dash.pwr.lol/" target="_blank">⚡ PowerBot</a>
<a class="btn hover-sound" href="https://dash.galaxybot.app/" target="_blank">🌌 GalaxyBot</a>

</div>

<!-- SOUND -->
<audio id="hoverSound">
    <source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3">
</audio>

<script>

/* LOADING */
window.onload = () => {
    setTimeout(()=>{
        document.getElementById("loading").style.display = "none";
    }, 1500);
};

/* CURSOR */
const glow = document.getElementById("glow");
document.addEventListener("mousemove",(e)=>{
    glow.style.left = e.clientX + "px";
    glow.style.top = e.clientY + "px";
});

/* MATRIX */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "01CYBERDARKHUBLEBUSCHO$$##@@++";
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = Array.from({length:columns}, ()=>1);

let matrixEnabled = true;

function drawMatrix(){
    if(!matrixEnabled) return;

    ctx.fillStyle = "rgba(5,1,10,0.08)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "#b300ff";
    ctx.font = fontSize + "px monospace";

    for(let i=0;i<drops.length;i++){
        const text = letters[Math.floor(Math.random()*letters.length)];
        ctx.fillText(text,i*fontSize,drops[i]*fontSize);

        if(drops[i]*fontSize > canvas.height && Math.random()>0.975){
            drops[i]=0;
        }
        drops[i]++;
    }
}
setInterval(drawMatrix,35);

/* SOUND */
let soundEnabled = true;
const sound = document.getElementById("hoverSound");

document.querySelectorAll(".hover-sound").forEach(btn=>{
    btn.addEventListener("mouseenter",()=>{
        if(!soundEnabled) return;
        sound.currentTime=0;
        sound.volume=0.4;
        sound.play();
    });
});

/* SETTINGS */
function toggleSound(){
    soundEnabled = !soundEnabled;
}

function toggleMatrix(){
    const c = document.getElementById("matrix");
    matrixEnabled = !matrixEnabled;
    c.style.display = matrixEnabled ? "block" : "none";
}

</script>

</body>
</html>
