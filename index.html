<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeBuscho's Dark Hub V3</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Orbitron',sans-serif;
}
html{ scroll-behavior:smooth; }
body{
    overflow:hidden;
    color:white;
    background:#070012;
    height:100vh;
}

/* =======================
      BACKGROUND
======================= */
body::before{
    content:"";
    position:fixed;
    inset:-30%;
    background: linear-gradient(-45deg, #12001f, #350066, #7d00ff, #ff00ff, #4a00ff, #220033, #12001f);
    background-size:600% 600%;
    animation:bgMove 18s ease infinite;
    filter:blur(80px);
    z-index:-5;
}
@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* =======================
      MATRIX
======================= */
#matrix{
    position:fixed;
    inset:0;
    opacity:.13;
    z-index:-4;
}

/* =======================
      PARTICLES
======================= */
#particles{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:-3;
}

/* =======================
      CURSOR
======================= */
#cursor{
    position:fixed;
    width:300px;
    height:300px;
    border-radius:50%;
    background: radial-gradient(circle, rgba(255,0,255,.30), transparent 70%);
    filter:blur(35px);
    pointer-events:none;
    transform:translate(-50%,-50%);
    z-index:999;
}

/* =======================
      LOADING
======================= */
#loading{
    position:fixed;
    inset:0;
    background:#05010a;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:99999;
}
.loader{
    width:100px;
    height:100px;
    border-radius:50%;
    border:4px solid rgba(255,255,255,.1);
    border-top:4px solid #ff00ff;
    animation:spin 1s linear infinite;
    box-shadow: 0 0 30px #ff00ff, 0 0 80px #7000ff;
}
.loadingText{
    margin-top:25px;
    font-size:22px;
    letter-spacing:3px;
    color:#ff9cff;
}
@keyframes spin{ 100%{ transform:rotate(360deg); } }

/* =======================
      MAIN
======================= */
.container{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    perspective:1500px;
}

/* =======================
      TITLE
======================= */
h1{
    font-size:72px;
    color:#efb6ff;
    text-shadow: 0 0 15px #ff00ff, 0 0 40px #d000ff, 0 0 120px #7d00ff;
    animation:titleGlow 2s infinite;
}
@keyframes titleGlow{
    50%{ text-shadow: 0 0 30px #ff00ff, 0 0 70px #d000ff, 0 0 150px #7d00ff; }
}
.subtitle{
    margin-top:8px;
    margin-bottom:35px;
    color:#d0d0d0;
}

/* =======================
      SEARCH BAR
======================= */
.search{
    display:flex;
    gap:12px;
    margin-bottom:40px;
    width:100%;
    max-width:560px;
    padding:0 15px;
}
.search input{
    flex:1;
    padding:16px;
    font-size:16px;
    border:none;
    outline:none;
    border-radius:16px;
    background:white;
    color:black;
    box-shadow: 0 0 20px rgba(255,0,255,.2);
}
.search input:hover{
    box-shadow: 0 0 50px #ff00ff;
}
.search button{
    padding:16px 26px;
    font-size:15px;
    font-weight:bold;
    border:none;
    border-radius:16px;
    background:linear-gradient(135deg,#7d00ff,#ff00ff);
    color:white;
}
.search button:hover{
    transform:scale(1.05);
}

/* =======================
      3D BUTTONS
======================= */
.btn{
    width:340px;
    padding:16px;
    margin:10px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    text-decoration:none;
    font-size:18px;
    font-weight:bold;
    color:white;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,0,255,.35);
    border-radius:16px;
    backdrop-filter:blur(18px);
    box-shadow: 0 0 18px rgba(180,0,255,.2);
    transition:.3s;
}
.btn:hover{
    transform: translateY(-6px) scale(1.03);
    background:rgba(255,0,255,.18);
    border-color:#ff00ff;
    box-shadow: 0 0 30px #ff00ff;
}

/* =======================
      APP BUTTONS (BOTTOM LEFT)
======================= */
.quickApps{
    position:fixed;
    left:15px;
    bottom:15px;
    display:flex;
    flex-direction:column;
    gap:8px;
    z-index:50;
}
.app-btn{
    width:240px;
    padding:13px 18px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    text-decoration:none;
    font-size:16px;
    font-weight:bold;
    color:white;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,0,255,.35);
    border-radius:14px;
    backdrop-filter:blur(18px);
    box-shadow: 0 0 15px rgba(180,0,255,.2);
    transition:.3s;
}
.app-btn:hover{
    transform: translateY(-4px) scale(1.03);
    background:rgba(255,0,255,.18);
    border-color:#ff00ff;
}

/* =======================
      CLOCK
======================= */
.clock{
    position:fixed;
    left:15px;
    top:15px;
    padding:12px 16px;
    border-radius:14px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,0,255,.3);
    z-index:50;
}
#time{ font-size:22px; }
#date{
    margin-top:4px;
    font-size:12px;
    color:#d0d0d0;
}

/* =======================
      SETTINGS
======================= */
.settings{
    position:fixed;
    right:15px;
    top:15px;
    display:flex;
    gap:8px;
    z-index:50;
}
.settings button{
    width:48px;
    height:48px;
    border:none;
    border-radius:12px;
    font-size:20px;
    color:white;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,0,255,.3);
    backdrop-filter:blur(18px);
}

/* =======================
      MINI GAME - BOTTOM RIGHT
======================= */
.miniGame{
    position:fixed;
    right:15px;
    bottom:15px;
    width:230px;
    background:rgba(10,0,25,.9);
    border:1px solid rgba(255,0,255,.45);
    border-radius:16px;
    backdrop-filter:blur(20px);
    padding:12px;
    z-index:60;
    box-shadow: 0 0 20px rgba(180,0,255,.25);
}
.miniGame h3{
    font-size:13px;
    margin-bottom:6px;
    color:#ff9cff;
    text-align:center;
}
#gameCanvas{
    display:block;
    margin:0 auto;
    border:2px solid #ff00ff;
    border-radius:8px;
    background:#0a0018;
    box-shadow: 0 0 15px #ff00ff;
}
.gameInfo{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:8px;
    font-size:12px;
}
#gameScore{ color:#00f0ff; font-weight:bold; }
#highScore{ color:#ff9cff; font-weight:bold; }
#gameStartBtn{
    padding:5px 12px;
    font-size:11px;
    background:rgba(255,0,255,.15);
    border:1px solid #ff00ff;
    color:white;
    border-radius:8px;
}

/* =======================
      MOBILE RESPONSIVE
======================= */
@media (max-width: 768px) {
    body {
        overflow: auto;
        height: auto;
        min-height: 100vh;
    }
    
    .container {
        padding-top: 90px;
        padding-bottom: 100px;
    }
    
    h1 {
        font-size: 38px;
    }
    
    .search {
        max-width: 95%;
    }
    
    .btn {
        width: 90%;
        max-width: 300px;
        font-size: 16px;
        padding: 14px;
    }
    
    .app-btn {
        width: 200px;
        font-size: 14px;
        padding: 11px 14px;
    }
    
    .quickApps {
        left: 10px;
        bottom: 10px;
    }
    
    .clock {
        left: 10px;
        top: 10px;
    }
    
    .settings {
        right: 10px;
        top: 10px;
    }

    .miniGame {
        display: none;
    }
}
</style>
</head>
<body>

<div id="loading">
    <div class="loader"></div>
    <div class="loadingText">BOOTING DARK HUB...</div>
</div>

<canvas id="matrix"></canvas>
<div id="particles"></div>
<div id="cursor"></div>

<div class="clock">
    <div id="time">00:00:00</div>
    <div id="date">Loading...</div>
</div>

<div class="settings">
    <button onclick="toggleSound()">🔊</button>
    <button onclick="toggleMatrix()">🌌</button>
    <button onclick="toggleParticles()">✨</button>
</div>

<!-- ROBLOX & DISCORD -->
<div class="quickApps">
    <a class="app-btn" href="roblox://" target="_blank">🎮 Roblox</a>
    <a class="app-btn" href="discord://" target="_blank">💬 Discord</a>
</div>

<div class="container">
    <form class="search" id="searchForm">
        <input id="searchInput" type="text" placeholder="🔍 Google suchen oder Link eingeben...">
        <button>Suchen</button>
    </form>

    <h1>LeBuscho's Dark Hub</h1>
    <div class="subtitle">Cyber Neon Dashboard</div>

    <a class="btn" href="https://bigtimefm.de/wunschbox" target="_blank">🎵 BigTimeFM</a>
    <a class="btn" href="https://scnx.app/de/guild/1469647834675413079/bot/manage" target="_blank">🤖 SCNX Dashboard</a>
    <a class="btn" href="https://dash.pwr.lol/" target="_blank">⚡ PowerBot</a>
    <a class="btn" href="https://dash.galaxybot.app/" target="_blank">🌌 GalaxyBot</a>
    
    <!-- YOUTUBE BUTTON -->
    <a class="btn" href="https://www.youtube.com" target="_blank">📺 YouTube</a>
</div>

<!-- NEON SNAKE (Desktop only) -->
<div class="miniGame">
    <h3>⚡ NEON SNAKE</h3>
    <canvas id="gameCanvas" width="180" height="180"></canvas>
    <div class="gameInfo">
        <div>
            Score: <span id="gameScore">0</span><br>
            <span style="font-size:10px;">Highscore: <span id="highScore">0</span></span>
        </div>
        <button id="gameStartBtn">▶ START</button>
    </div>
</div>

<script>
// =======================
//   LOADING (FIXED)
// =======================
const loading = document.getElementById("loading");

window.addEventListener("load", () => {
    if (!loading) return;
    setTimeout(() => {
        loading.style.transition = "opacity 0.6s ease";
        loading.style.opacity = "0";
        setTimeout(() => {
            if (loading && loading.parentNode) loading.parentNode.removeChild(loading);
        }, 650);
    }, 1800);
});

/* LIVE CLOCK */
const time = document.getElementById("time");
const date = document.getElementById("date");

function updateClock() {
    const now = new Date();
    time.innerHTML = now.toLocaleTimeString("de-DE");
    date.innerHTML = now.toLocaleDateString("de-DE", {
        weekday: "long", day: "2-digit", month: "long", year: "numeric"
    });
}
updateClock();
setInterval(updateClock, 1000);

/* CURSOR GLOW */
const cursor = document.getElementById("cursor");
document.addEventListener("mousemove", e => {
    cursor.style.left = e.clientX + "px";
    cursor.style.top = e.clientY + "px";
});

/* MATRIX */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

const letters = "01LEBUSCHOCYBERHUB";
const fontSize = 16;
const cols = Math.floor(canvas.width / fontSize);
const drops = [];
for (let i = 0; i < cols; i++) drops[i] = 1;

let matrixEnabled = true;

function drawMatrix() {
    if (!matrixEnabled) return;
    ctx.fillStyle = "rgba(6,0,18,.08)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#d000ff";
    ctx.font = fontSize + "px monospace";
    for (let i = 0; i < drops.length; i++) {
        const txt = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(txt, i * fontSize, drops[i] * fontSize);
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
    }
}
setInterval(drawMatrix, 35);

/* PARTICLES */
const particleContainer = document.getElementById("particles");
let particlesEnabled = true;

function createParticle() {
    if (!particlesEnabled) return;
    const p = document.createElement("div");
    p.className = "particle";
    const size = Math.random() * 8 + 2;
    p.style.width = size + "px";
    p.style.height = size + "px";
    p.style.left = Math.random() * 100 + "vw";
    p.style.animationDuration = (Math.random() * 8 + 8) + "s";
    particleContainer.appendChild(p);
    setTimeout(() => { p.remove(); }, 17000);
}
setInterval(createParticle, 90);

/* SOUNDS */
let soundEnabled = true;
const audio = new (window.AudioContext || window.webkitAudioContext)();

function keyboardSound() {
    if (!soundEnabled) return;
    const osc = audio.createOscillator();
    const gain = audio.createGain();
    osc.type = "square";
    osc.frequency.value = 1400;
    gain.gain.value = .08;
    osc.connect(gain);
    gain.connect(audio.destination);
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.0001, audio.currentTime + .05);
    osc.stop(audio.currentTime + .05);
}

function playSearchThock() {
    if (!soundEnabled) return;
    try {
        const ctx = audio;
        const osc1 = ctx.createOscillator();
        osc1.type = 'sine';
        osc1.frequency.value = 78;
        const gain1 = ctx.createGain();
        gain1.gain.value = 0.32;
        const filter1 = ctx.createBiquadFilter();
        filter1.type = 'lowpass';
        filter1.frequency.value = 380;
        osc1.connect(filter1);
        filter1.connect(gain1);
        gain1.connect(ctx.destination);
        osc1.start();
        gain1.gain.exponentialRampToValueAtTime(0.0008, ctx.currentTime + 0.22);
        osc1.stop(ctx.currentTime + 0.28);

        setTimeout(() => {
            const osc2 = ctx.createOscillator();
            osc2.type = 'square';
            osc2.frequency.value = 580;
            const gain2 = ctx.createGain();
            gain2.gain.value = 0.11;
            osc2.connect(gain2);
            gain2.connect(ctx.destination);
            osc2.start();
            gain2.gain.exponentialRampToValueAtTime(0.0005, ctx.currentTime + 0.07);
            osc2.stop(ctx.currentTime + 0.09);
        }, 6);
    } catch(e) {}
}

const input = document.getElementById("searchInput");
input.addEventListener("keydown", playSearchThock);

/* GOOGLE SEARCH */
const form = document.getElementById("searchForm");
form.addEventListener("submit", function(e) {
    e.preventDefault();
    let value = input.value.trim();
    if (value === "") return;
    if (value.startsWith("http://") || value.startsWith("https://")) {
        window.open(value, "_blank"); return;
    }
    if (value.includes(".") && !value.includes(" ")) {
        window.open("https://" + value, "_blank"); return;
    }
    window.open("https://www.google.com/search?q=" + encodeURIComponent(value), "_blank");
});

/* SETTINGS */
function toggleSound() { soundEnabled = !soundEnabled; }
function toggleMatrix() {
    matrixEnabled = !matrixEnabled;
    canvas.style.display = matrixEnabled ? "block" : "none";
}
function toggleParticles() {
    particlesEnabled = !particlesEnabled;
    particleContainer.style.display = particlesEnabled ? "block" : "none";
}

/* 3D PARALLAX */
const buttons = document.querySelectorAll(".btn, .app-btn");
document.addEventListener("mousemove", e => {
    const x = (e.clientX / window.innerWidth - 0.5) * 18;
    const y = (e.clientY / window.innerHeight - 0.5) * 18;
    buttons.forEach(btn => {
        btn.style.transform = `rotateX(${-y}deg) rotateY(${x}deg) translateY(-4px)`;
    });
});
document.addEventListener("mouseleave", () => {
    buttons.forEach(btn => { btn.style.transform = ""; });
});

/* SEARCH GLOW */
input.addEventListener("mouseenter", () => { input.style.boxShadow = "0 0 50px #ff00ff"; });
input.addEventListener("mouseleave", () => {
    if (document.activeElement !== input) input.style.boxShadow = "";
});
input.addEventListener("focus", () => { input.style.boxShadow = "0 0 60px #ff00ff"; });
input.addEventListener("blur", () => { input.style.boxShadow = ""; });

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

setTimeout(() => {
    document.body.style.transition = "1s";
    document.body.style.opacity = "1";
}, 100);

document.querySelectorAll(".btn").forEach(btn => {
    btn.addEventListener("mouseenter", keyboardSound);
});

/* =======================
   ERWEITERTE & SICHERE SNAKE LOGIK
======================= */
const gameCanvas = document.getElementById("gameCanvas");
const gameCtx = gameCanvas.getContext("2d");
const gameScoreEl = document.getElementById("gameScore");
const highScoreEl = document.getElementById("highScore");
const startBtn = document.getElementById("gameStartBtn");

let snake = [];
let dx = 15, dy = 0;
let food = {x: 0, y: 0};
let score = 0;
let highScore = 0;
let gameInterval = null;
let gameRunning = false;
let gameSpeed = 140;

const gridSize = 15;
const tileCount = 12;

// Sicheres Laden des Highscores
try {
    highScore = parseInt(localStorage.getItem('neonSnakeHighScore')) || 0;
} catch (e) {
    console.warn("localStorage nicht verfügbar (Sandbox)");
    highScore = 0;
}
highScoreEl.textContent = highScore;

function initSnake() {
    snake = [{x:5,y:5}, {x:4,y:5}, {x:3,y:5}];
    dx = 15; dy = 0;
    score = 0;
    gameScoreEl.textContent = score;
    gameSpeed = 140;
    placeFood();
}

function placeFood() {
    food.x = Math.floor(Math.random() * tileCount);
    food.y = Math.floor(Math.random() * tileCount);
    for (let s of snake) {
        if (s.x === food.x && s.y === food.y) { placeFood(); return; }
    }
}

function drawGame() {
    gameCtx.fillStyle = "#0a0018";
    gameCtx.fillRect(0, 0, gameCanvas.width, gameCanvas.height);

    gameCtx.strokeStyle = "rgba(255,0,255,0.15)";
    for (let i = 0; i <= tileCount; i++) {
        gameCtx.beginPath();
        gameCtx.moveTo(i * gridSize, 0);
        gameCtx.lineTo(i * gridSize, gameCanvas.height);
        gameCtx.stroke();
        gameCtx.beginPath();
        gameCtx.moveTo(0, i * gridSize);
        gameCtx.lineTo(gameCanvas.width, i * gridSize);
        gameCtx.stroke();
    }

    gameCtx.fillStyle = "#00ffff";
    for (let i = 0; i < snake.length; i++) {
        gameCtx.fillRect(snake[i].x * gridSize, snake[i].y * gridSize, gridSize-1, gridSize-1);
    }

    gameCtx.fillStyle = "#ff00ff";
    gameCtx.shadowBlur = 12;
    gameCtx.shadowColor = "#ff00ff";
    gameCtx.fillRect(food.x * gridSize + 2, food.y * gridSize + 2, gridSize-4, gridSize-4);
    gameCtx.shadowBlur = 0;
}

function moveSnake() {
    const head = {x: snake[0].x + (dx / gridSize), y: snake[0].y + (dy / gridSize)};

    if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
        endGame(); return;
    }
    for (let s of snake) {
        if (s.x === head.x && s.y === head.y) { endGame(); return; }
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
        score += 10;
        gameScoreEl.textContent = score;
        playEatSound();
        placeFood();

        if (score % 30 === 0 && gameSpeed > 60) {
            gameSpeed -= 15;
            clearInterval(gameInterval);
            gameInterval = setInterval(gameLoop, gameSpeed);
        }
    } else {
        snake.pop();
    }
}

function gameLoop() {
    if (!gameRunning) return;
    moveSnake();
    drawGame();
}

function changeDirection(e) {
    if (!gameRunning) return;
    const key = e.key.toLowerCase();

    if ((key === "arrowleft" || key === "a") && dx !== 15) { dx = -15; dy = 0; }
    else if ((key === "arrowright" || key === "d") && dx !== -15) { dx = 15; dy = 0; }
    else if ((key === "arrowup" || key === "w") && dy !== 15) { dx = 0; dy = -15; }
    else if ((key === "arrowdown" || key === "s") && dy !== -15) { dx = 0; dy = 15; }
}

function playEatSound() {
    if (!soundEnabled) return;
    try {
        const osc = audio.createOscillator();
        const gain = audio.createGain();
        osc.type = "sawtooth";
        osc.frequency.value = 650;
        gain.gain.value = 0.15;
        osc.connect(gain);
        gain.connect(audio.destination);
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.0001, audio.currentTime + 0.2);
        osc.stop(audio.currentTime + 0.25);
    } catch(e) {}
}

function startGame() {
    if (gameRunning) return;
    initSnake();
    drawGame();
    gameRunning = true;
    startBtn.textContent = "⏸ PAUSE";
    if (gameInterval) clearInterval(gameInterval);
    gameInterval = setInterval(gameLoop, gameSpeed);
}

function endGame() {
    gameRunning = false;
    clearInterval(gameInterval);
    startBtn.textContent = "▶ RESTART";

    if (score > highScore) {
        highScore = score;
        highScoreEl.textContent = highScore;
        try {
            localStorage.setItem('neonSnakeHighScore', highScore);
        } catch (e) {}
    }

    gameCtx.fillStyle = "rgba(0,0,0,0.8)";
    gameCtx.fillRect(0, 0, gameCanvas.width, gameCanvas.height);
    
    gameCtx.fillStyle = "#ff00ff";
    gameCtx.font = "bold 16px Orbitron";
    gameCtx.textAlign = "center";
    gameCtx.fillText("GAME OVER", gameCanvas.width/2, gameCanvas.height/2 - 15);
    
    gameCtx.font = "13px Orbitron";
    gameCtx.fillText("Score: " + score, gameCanvas.width/2, gameCanvas.height/2 + 8);
    
    if (score === highScore && score > 0) {
        gameCtx.fillStyle = "#00f0ff";
        gameCtx.fillText("NEW HIGHSCORE!", gameCanvas.width/2, gameCanvas.height/2 + 28);
    }
}

startBtn.addEventListener("click", () => {
    const txt = startBtn.textContent;
    if (txt.includes("START") || txt.includes("RESTART")) {
        startGame();
    } else if (txt.includes("PAUSE")) {
        gameRunning = false;
        clearInterval(gameInterval);
        startBtn.textContent = "▶ CONTINUE";
    } else if (txt.includes("CONTINUE")) {
        gameRunning = true;
        startBtn.textContent = "⏸ PAUSE";
        gameInterval = setInterval(gameLoop, gameSpeed);
    }
});

document.addEventListener("keydown", changeDirection);

// Initialisierung
initSnake();
drawGame();
highScoreEl.textContent = highScore;
</script>
