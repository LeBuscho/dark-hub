<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LeBuscho's Dark Hub</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

/*=========================
        RESET
=========================*/

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

html{
scroll-behavior:smooth;
}

body{

background:#06000d;

overflow:hidden;

height:100vh;

color:white;

}

/*=========================
     ANIMATED BACKGROUND
=========================*/

body::before{

content:"";

position:fixed;

left:-30%;
top:-30%;

width:170%;
height:170%;

background:

linear-gradient(
-45deg,

#090013,

#250045,

#46008b,

#7d00ff,

#d000ff,

#5500aa,

#090013

);

background-size:600% 600%;

animation:gradientMove 20s ease infinite;

filter:blur(80px);

opacity:.9;

z-index:-5;

}

@keyframes gradientMove{

0%{background-position:0% 50%;}

25%{background-position:50% 100%;}

50%{background-position:100% 50%;}

75%{background-position:50% 0%;}

100%{background-position:0% 50%;}

}

/*=========================
      GLOW LAYER
=========================*/

body::after{

content:"";

position:fixed;

inset:0;

background:

radial-gradient(circle at 20% 20%,
rgba(255,0,255,.25),
transparent 35%),

radial-gradient(circle at 85% 35%,
rgba(90,0,255,.20),
transparent 40%),

radial-gradient(circle at 45% 90%,
rgba(160,0,255,.18),
transparent 45%);

animation:ambientGlow 10s ease-in-out infinite alternate;

z-index:-4;

}

@keyframes ambientGlow{

from{

transform:scale(1);

}

to{

transform:scale(1.2) rotate(6deg);

}

}

/*=========================
      MATRIX
=========================*/

#matrix{

position:fixed;

inset:0;

width:100%;
height:100%;

opacity:.12;

z-index:-3;

pointer-events:none;

}

/*=========================
      PARTICLES
=========================*/

#particles{

position:fixed;

inset:0;

pointer-events:none;

z-index:-2;

overflow:hidden;

}

.particle{

position:absolute;

border-radius:50%;

background:#d000ff;

box-shadow:

0 0 10px #ff00ff,

0 0 25px #c000ff,

0 0 60px #7300ff;

animation:particleFloat linear infinite;

}

@keyframes particleFloat{

0%{

transform:
translateY(120vh)
scale(.3);

opacity:0;

}

20%{

opacity:1;

}

100%{

transform:
translateY(-20vh)
scale(1.4);

opacity:0;

}

}

/*=========================
     CURSOR GLOW
=========================*/

#cursor{

position:fixed;

width:320px;

height:320px;

border-radius:50%;

background:

radial-gradient(circle,

rgba(255,0,255,.28),

transparent 70%);

filter:blur(30px);

pointer-events:none;

transform:translate(-50%,-50%);

z-index:999;

}

/*=========================
     LOADING SCREEN
=========================*/

#loading{

position:fixed;

inset:0;

background:#05010a;

display:flex;

justify-content:center;

align-items:center;

flex-direction:column;

z-index:999999;

}

.loader{

width:100px;

height:100px;

border-radius:50%;

border:4px solid rgba(255,255,255,.08);

border-top:4px solid #d000ff;

animation:spin .9s linear infinite;

box-shadow:

0 0 30px #ff00ff,

0 0 80px #7000ff;

}

.loadingTitle{

margin-top:30px;

font-size:22px;

letter-spacing:4px;

color:#ff8fff;

text-shadow:

0 0 20px #ff00ff;

}

@keyframes spin{

100%{

transform:rotate(360deg);

}

}

/*=========================
        MAIN
=========================*/

.container{

position:relative;

z-index:10;

height:100vh;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

perspective:1600px;

}

h1{

font-size:78px;

font-weight:800;

color:#e2a4ff;

text-shadow:

0 0 15px #ff00ff,

0 0 45px #d000ff,

0 0 120px #6500ff;

animation:titleGlow 2.5s infinite;

margin-bottom:10px;

}

@keyframes titleGlow{

50%{

text-shadow:

0 0 25px #ff00ff,

0 0 70px #d000ff,

0 0 150px #7600ff;

}

}

.subtitle{

margin-bottom:40px;

color:#d0d0d0;

letter-spacing:2px;

font-size:18px;

}

/*=========================
    GOOGLE SEARCH BAR
=========================*/

.search{

display:flex;

gap:12px;

margin-bottom:45px;

}

.search input{

width:520px;

padding:18px;

border-radius:18px;

border:1px solid rgba(255,0,255,.3);

background:rgba(255,255,255,.08);

backdrop-filter:blur(20px);

color:white;

font-size:16px;

outline:none;

transition:.3s;

box-shadow:0 0 20px rgba(180,0,255,.2);

}

.search input:focus{

border-color:#ff00ff;

box-shadow:0 0 35px #ff00ff;

}

.search button{

padding:18px 28px;

border:none;

border-radius:18px;

cursor:pointer;

font-weight:bold;

font-size:16px;

background:linear-gradient(135deg,#7700ff,#ff00ff);

color:white;

transition:.3s;

box-shadow:0 0 25px #9500ff;

}

.search button:hover{

transform:scale(1.06);

box-shadow:0 0 40px #ff00ff;

}
/* ==========================
        BUTTONS
========================== */

.btn{

width:360px;

padding:18px;

margin:15px;

display:flex;

justify-content:center;

align-items:center;

gap:12px;

text-decoration:none;

font-size:20px;

font-weight:bold;

color:white;

border-radius:18px;

background:rgba(255,255,255,.08);

border:1px solid rgba(255,0,255,.35);

backdrop-filter:blur(20px);

box-shadow:

0 0 25px rgba(180,0,255,.25);

transition:.35s;

transform-style:preserve-3d;

}

.btn:hover{

transform:

translateY(-8px)

rotateX(10deg)

rotateY(-10deg)

scale(1.05);

box-shadow:

0 0 30px #ff00ff,

0 0 70px #9000ff;

border-color:#ff00ff;

}

/* ==========================
        SETTINGS
========================== */

.settings{

position:fixed;

top:25px;

right:25px;

display:flex;

gap:12px;

z-index:50;

}

.settings button{

width:55px;

height:55px;

border:none;

border-radius:16px;

background:rgba(255,255,255,.08);

border:1px solid rgba(255,0,255,.35);

backdrop-filter:blur(20px);

color:white;

font-size:22px;

cursor:pointer;

transition:.3s;

}

.settings button:hover{

transform:scale(1.1);

box-shadow:

0 0 25px #ff00ff;

}

/* ==========================
        CLOCK
========================== */

.clock{

position:fixed;

left:25px;

top:25px;

padding:16px 22px;

border-radius:18px;

background:rgba(255,255,255,.08);

border:1px solid rgba(255,0,255,.25);

backdrop-filter:blur(20px);

box-shadow:0 0 20px rgba(150,0,255,.2);

z-index:50;

}

#time{

font-size:26px;

color:#fff;

}

#date{

margin-top:5px;

font-size:14px;

color:#bbbbbb;

}

</style>

</head>

<body>

<!-- LOADING -->

<div id="loading">

<div class="loader"></div>

<div class="loadingTitle">

BOOTING DARK HUB...

</div>

</div>

<!-- MATRIX -->

<canvas id="matrix"></canvas>

<!-- PARTICLES -->

<div id="particles"></div>

<!-- CURSOR -->

<div id="cursor"></div>

<!-- CLOCK -->

<div class="clock">

<div id="time">00:00:00</div>

<div id="date">Loading...</div>

</div>

<!-- SETTINGS -->

<div class="settings">

<button onclick="toggleSound()">🔊</button>

<button onclick="toggleMatrix()">🌌</button>

<button onclick="toggleParticles()">✨</button>

</div>

<!-- MAIN -->

<div class="container">

<form
class="search"
action="https://www.google.com/search"
method="GET"
target="_blank">

<input
type="text"
name="q"
placeholder="🔍 Google durchsuchen...">

<button>

Suchen

</button>

</form>

<h1>

LeBuscho's Dark Hub

</h1>

<div class="subtitle">

Cyber Neon Dashboard

</div>

<a class="btn hover">

🎵 BigTimeFM

</a>

<a class="btn hover">

🤖 SCNX Dashboard

</a>

<a class="btn hover">

⚡ PowerBot Dashboard

</a>

<a class="btn hover">

🌌 Galaxy Dashboard

</a>

</div>

<script>
/* ===========================
        LOADING
=========================== */

window.addEventListener("load",()=>{

setTimeout(()=>{

document.getElementById("loading").style.opacity="0";

setTimeout(()=>{

document.getElementById("loading").style.display="none";

},600);

},1800);

});

/* ===========================
        LIVE CLOCK
=========================== */

function updateClock(){

const now=new Date();

const time=now.toLocaleTimeString("de-DE");

const date=now.toLocaleDateString("de-DE",{

weekday:"long",

day:"2-digit",

month:"long",

year:"numeric"

});

document.getElementById("time").innerHTML=time;

document.getElementById("date").innerHTML=date;

}

setInterval(updateClock,1000);

updateClock();

/* ===========================
      CURSOR GLOW
=========================== */

const cursor=document.getElementById("cursor");

document.addEventListener("mousemove",(e)=>{

cursor.style.left=e.clientX+"px";

cursor.style.top=e.clientY+"px";

});

/* ===========================
      MATRIX RAIN
=========================== */

const canvas=document.getElementById("matrix");

const ctx=canvas.getContext("2d");

function resize(){

canvas.width=window.innerWidth;

canvas.height=window.innerHeight;

}

resize();

window.addEventListener("resize",resize);

const chars="01LEBUSCHOCYBERHUB";

const size=16;

const columns=Math.floor(canvas.width/size);

const drops=[];

for(let i=0;i<columns;i++) drops[i]=1;

let matrix=true;

function drawMatrix(){

if(!matrix) return;

ctx.fillStyle="rgba(6,0,13,.08)";

ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#d000ff";

ctx.font=size+"px monospace";

for(let i=0;i<drops.length;i++){

const text=chars[Math.floor(Math.random()*chars.length)];

ctx.fillText(text,i*size,drops[i]*size);

if(drops[i]*size>canvas.height&&Math.random()>0.975){

drops[i]=0;

}

drops[i]++;

}

}

setInterval(drawMatrix,35);

/* ===========================
      PARTICLES
=========================== */

const particleBox=document.getElementById("particles");

let particlesEnabled=true;

function createParticle(){

if(!particlesEnabled) return;

const p=document.createElement("div");

p.className="particle";

const s=Math.random()*6+2;

p.style.width=s+"px";

p.style.height=s+"px";

p.style.left=Math.random()*100+"vw";

p.style.animationDuration=(Math.random()*8+8)+"s";

particleBox.appendChild(p);

setTimeout(()=>{

p.remove();

},16000);

}

setInterval(createParticle,120);
/* ===========================
      HOVER SOUND
=========================== */

let soundEnabled = true;

const audioContext = new (window.AudioContext || window.webkitAudioContext)();

function playHover(){

    if(!soundEnabled) return;

    const osc = audioContext.createOscillator();
    const gain = audioContext.createGain();

    osc.type = "triangle";
    osc.frequency.value = 700;

    gain.gain.value = 0.03;

    osc.connect(gain);
    gain.connect(audioContext.destination);

    osc.start();

    osc.frequency.exponentialRampToValueAtTime(
        1200,
        audioContext.currentTime + 0.08
    );

    gain.gain.exponentialRampToValueAtTime(
        0.0001,
        audioContext.currentTime + 0.12
    );

    osc.stop(audioContext.currentTime + 0.12);

}

/* ===========================
        BUTTON LINKS
=========================== */

const buttons = document.querySelectorAll(".btn");

buttons[0].href = "https://bigtimefm.de/wunschbox";
buttons[1].href = "https://scnx.app/de/guild/1469647834675413079/bot/manage";
buttons[2].href = "https://dash.pwr.lol/";
buttons[3].href = "https://dash.galaxybot.app/";

buttons.forEach(btn=>{

    btn.target="_blank";

    btn.addEventListener("mouseenter",()=>{

        playHover();

    });

});

/* ===========================
      SETTINGS
=========================== */

function toggleSound(){

    soundEnabled = !soundEnabled;

}

function toggleMatrix(){

    matrix = !matrix;

    canvas.style.display = matrix ? "block" : "none";

}

function toggleParticles(){

    particlesEnabled = !particlesEnabled;

    particleBox.style.display =
    particlesEnabled ? "block" : "none";

}

/* ===========================
      3D PARALLAX
=========================== */

document.addEventListener("mousemove",(e)=>{

    const x = (e.clientX/window.innerWidth-.5)*20;
    const y = (e.clientY/window.innerHeight-.5)*20;

    buttons.forEach(btn=>{

        btn.style.transform =
        `rotateX(${-y}deg)
         rotateY(${x}deg)
         translateY(-4px)`;

    });

});

document.addEventListener("mouseleave",()=>{

    buttons.forEach(btn=>{

        btn.style.transform="";

    });

});

/* ===========================
      RESIZE
=========================== */

window.addEventListener("resize",()=>{

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

});

</script>

</body>
</html>
